name: ci

# CPU-only, no API keys: runs the reasoner's tests and the offline reproduction path
# (cached LLM transcripts aggregated, paired significance test), proving the repo's
# reproducibility claims in a clean environment on every push.
on:
  push:
  pull_request:

jobs:
  cpu-repro:
    runs-on: ubuntu-latest
    env:
      OMP_NUM_THREADS: "2"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install (CPU-only torch, then the package)
        run: |
          python -m pip install --upgrade pip
          pip install torch --index-url https://download.pytorch.org/whl/cpu
          pip install -e .
      - name: Reasoner invariants (tests)
        run: python -m pytest tests/ -q
      - name: Paired significance test (cached transcripts, no API)
        run: python experiments/significance.py
      - name: Aggregate cached LLM transcripts (no API)
        run: |
          python experiments/ca_scaling_llm.py --dump results/ca018.jsonl --aggregate-only
          python experiments/ca_forward_llm.py --dump results/ca021_forward.jsonl --aggregate-only
          python experiments/ca_abduction_anthropic.py --aggregate-only --dump results/ca_opus_abduction.jsonl
          python experiments/ca_abduction_tool.py --aggregate-only --dump results/ca_opus_tool.jsonl
